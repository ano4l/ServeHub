  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  lucide_icons: ^0.257.0
  http: ^1.2.1
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.2
  riverpod_lint: ^2.6.2
