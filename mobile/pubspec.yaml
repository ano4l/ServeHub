  stomp_dart_client: ^2.0.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.1
  intl: ^0.19.0
  json_annotation: ^4.9.0
  flutter_svg: ^2.0.14
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
